name: CI Pipeline

on:
  push:
    branches:
      - "*"

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run linter
        run: echo "Linting passed!"

  train:
    needs: linter
    runs-on: ubuntu-latest

    if: >
      success() &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run training
        run: |
          echo "Running training..."
          echo "error happened" > error_logs.txt
          exit 1

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
